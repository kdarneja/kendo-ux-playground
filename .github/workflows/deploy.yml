name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          # pnpm 11 needs Node >= 22.13 (uses node:sqlite); Node 20 fails install.
          node-version: 22
          cache: pnpm

      - name: Write Kendo license file
        env:
          KENDO_LICENSE: ${{ secrets.KENDO_LICENSE }}
        run: |
          if [ -n "$KENDO_LICENSE" ]; then
            printf '%s' "$KENDO_LICENSE" > telerik-license.txt
            echo "License written ($(wc -c < telerik-license.txt) bytes)"
          else
            echo "No KENDO_LICENSE secret set — Kendo will show a watermark."
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
